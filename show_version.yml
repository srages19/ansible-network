---
- name: Get IOS-XE Device Information
  hosts: iosxe
  gather_facts: false

  tasks:
    - name: Run show version
      cisco.ios.ios_command:
        commands:
          - show version
          - show ip interface brief
          - show running-config
      register: output

    - name: Display output
      debug:
        var: output.stdout_lines
