    #------------------------------------------------------
    # SUMMARY
    #------------------------------------------------------

    - name: Display complete site build summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "SITE BUILD COMPLETE - {{ site_name }}"
          - "============================================"
          - "System IP:           {{ system_ip }}"
          - "Loopback IP:         {{ loopback_ip }}"
          - "Wired User Subnet:   {{ user_subnet }}"
          - "Wireless Subnet:     {{ wireless_subnet }}"
          - "Video Unit Subnet:   {{ video_subnet }}"
          - "Guest Subnet:        {{ guest_subnet }}"
          - "Trusted Space:       {{ site_container }}"
          - "Phones Subnet:       {{ phones_subnet }}"
          - "Printers Subnet:     {{ printers_subnet }}"
          - "AP Mgmt Subnet:      {{ ap_mgmt_subnet }}"
          - "Phys Sec Subnet:     {{ phys_sec_subnet }}"
          - "Device Mgmt Subnet:  {{ device_mgmt_subnet }}"
          - "============================================="
