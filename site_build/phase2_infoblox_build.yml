        password: "{{ infoblox_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          network: "func:nextavailablenetwork:{{ container_user }},27"
          comment: "AFL-ZERO-{{ site_name }}-USR001"
        status_code: 201
      register: user_subnet_result

    - name: Extract Wired User Subnet from response
      ansible.builtin.set_fact:
        user_subnet: "{{ user_subnet_result.json | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+/27)') }}"

    - name: Display Wired User Subnet
      ansible.builtin.debug:
        msg: "Wired User Subnet reserved: {{ user_subnet }}"

    #-------------------------------------------------
    # WIRELESS USER SUBNET
    #-------------------------------------------------
