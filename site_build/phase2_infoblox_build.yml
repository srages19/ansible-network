    - name: Display Wireless User Subnet
      ansible.builtin.debug:
        msg: "Wireless User Subnet reserved: {{ wireless_subnet }}" 

    #-------------------------------------------------
    # VIDEO UNIT SUBNET
    #-------------------------------------------------
    - name: Reserve Video Unit Subnet /28
      ansible.builtin.uri:
        url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network"
        method: POST
        user: "{{ infoblox_user }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: yes
