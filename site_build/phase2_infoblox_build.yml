    - name: Display Printers Subnet
      ansible.builtin.debug:
        msg: "Printers Subnet reserved: {{ printers_subnet }}"

    - name: Reserve AP Management Subnet /29
      ansible.builtin.uri:
        url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network"
        method: POST
        user: "{{ infoblox_user }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          network: "func:nextavailablenetwork:{{ site_container }},29"
          comment: "{{ site_name }}-AP"
        status_code: 201
      register: ap_mgmt_subnet_result

    - name: Extract AP Management Subnet from response
      ansible.builtin.set_fact:
        ap_mgmt_subnet: "{{ ap_mgmt_subnet_result.json | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+/29)') }}"

    - name: Display AP Management Subnet
      ansible.builtin.debug:
