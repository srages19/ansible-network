      register: device_mgmt_subnet_result

    - name: Extract Device Management Subnet from response
      ansible.builtin.set_fact:
        device_mgmt_subnet: "{{ device_mgmt_subnet_result.json | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+/29)') }}"

    - name: Display Device Management Subnet
