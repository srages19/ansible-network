    - name: Display Guest Subnet
      ansible.builtin.debug:
        msg: "Guest Subnet reserved: {{ guest_subnet }}"

    #-------------------------------------------------
    # TRUSTED SPACE /26
    #-------------------------------------------------
    - name: Reserve Trusted Space /26 for MKO
      ansible.builtin.uri:
        url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/networkcontainer"
        method: POST
        user: "{{ infoblox_user }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          network: "func:nextavailablenetwork:{{ container_site_pool }},26"
          comment: "{{ site_name }}"
        status_code: 201
      register: site_container_result

    - name: Extract Trusted Space from response
      ansible.builtin.set_fact:
        site_container: "{{ site_container_result.json | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+/26)') }}"

    - name: Display Trusted Space
      ansible.builtin.debug:
        msg: "Trusted Space reserved: {{ site_container }}"

    #-------------------------------------------------
    # TRUSTED SPACE NETWORKS
    #-------------------------------------------------
    - name: Reserve Phones Subnet /27
      ansible.builtin.uri:
        url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network"
