---
- name: Phase 2 - Infoblox Site Build
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/site_build.yml
    - ../group_vars/all/vault.yml

  tasks:

    # ---------------------------------------------------------
    # SYSTEM IP
    # ---------------------------------------------------------
    - name: Reserve System IP /32
      ansible.builtin.uri:
        url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network"
        method: POST
        user: "{{ infoblox_user }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          network: "func:nextavailablenetwork:{{ container_system_ip }},32"
          comment: "{{ site_name }}"
        status_code: 201
      register: system_ip_result

    - name: Extract System IP from response
      ansible.builtin.set_fact:
        system_ip: "{{ system_ip_result.json | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+/32)') }}"

    - name: Display System IP
      ansible.builtin.debug:
        msg: "System IP reserved: {{ system_ip }}"

    # ------------------------------------------------
    # LOOPBACK IP
    # ------------------------------------------------
    - name: Reserve Loopback IP /32
      ansible.builtin.uri:
        url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network"
        method: POST
        user: "{{ infoblox_user }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          network: "func:nextavailablenetwork:{{ container_loopback }},32"
          comment: "{{ site_name }}"
        status_code: 201
      register: loopback_result

    - name: Extract Loopback IP from response
      ansible.builtin.set_fact:
        loopback_ip: "{{ loopback_result.json | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+/32)') }}"

    - name: Display Loopback IP
      ansible.builtin.debug:
        msg: "Loopback IP reserved: {{ loopback_ip }}"

    #-------------------------------------------------
    # WIRED USER SUBNET
    #-------------------------------------------------
