    - name: Reserve Physical Security Subnet /29
      ansible.builtin.uri:
        url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network"
        method: POST
        user: "{{ infoblox_user }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          network: "func:nextavailablenetwork:{{ site_container }},29"
