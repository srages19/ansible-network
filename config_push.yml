---
- name: Push Configuration to IOS-XR Device
  hosts: ios
  gather_facts: false

  tasks:
    - name: Configure loopback interface
      cisco.iosxr.iosxr_config:
        lines:
          - description {{ loopback_description }}
          - ipv4 address {{ loopback_ip }} {{ loopback_prefix }}
        parents: interface Loopback{{ loopback_number }}

    - name: Verify loopback was created
      cisco.iosxr.iosxr_command:
        commands:
          - show interfaces Loopback{{ loopback_number }}
      register: output

    - name: Display verification output
      debug:
        var: output.stdout_lines
